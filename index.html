<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Wave</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>
        <body>
            <!-- header -->
            <header class="bg-[#1A0B2E] border-b border-white/10">
                <!-- navbar section -->
                <nav class="max-w-7xl mx-auto flex justify-between items-center py-8 px-6">
                <h1 class="text-4xl lg:text-5xl font-bold text-white">
                    Tech<span class="bg-linear-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] bg-clip-text text-transparent">Wave</span>
                </h1> 
                    <ul class="hidden lg:flex items-center gap-10 cursor-pointer text-white">
                        <li><a href="#">About</a></li>
                        <li><a href="#">Episodes</a></li>
                        <li><a href="#">Host</a></li>
                    </ul>
                    <button 
                        class="hidden lg:flex items-center gap-2 text-white font-semibold cursor-pointer 
                        rounded-full py-3 px-4 bg-linear-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8] hover:shadow-[0_0_20px_#FB09B4]">
                        Subscribe <i class="fa-solid fa-arrow-right"></i>
                    </button>   
                    <button 
                        class="lg:hidden text-white text-2xl"><i class="fa-solid fa-bars"></i>
                    </button> 
                </nav>
            </header>
            <!-- banner -->
            <section class="bg-[url('./assets/hero-bg.png')] bg-cover bg-center bg-no-repeat px-5 py-16 md:py-24 lg:py-32">
                <div class="flex flex-col items-center">
                    <div class="relative 
                    w-[160px] h-[160px]
                    md:w-[200px] md:h-[200px]
                    lg:w-[300px] lg:h-[300px]
                    bg-[url('./assets/hero-circle.png')] 
                    bg-cover bg-center bg-no-repeat 
                    flex justify-center items-center"> 
                    <img class="w-[40px] md:w-[60px] lg:w-[80px]" 
                    src="./assets/microphone.png" 
                    alt="Microphone">
                    <span class="absolute top-1 right-1
                    md:top-2 md:right-2
                    lg:top-5 lg:right-[-10px]
                    py-1 px-2
                    md:py-2 md:px-3
                    lg:px-4
                    bg-[#00FF88] 
                    rounded-full
                    text-[#1A0B2E] 
                    font-semibold 
                    text-xs md:text-sm lg:text-base">New</span>
                </div>
                <div class="text-center pt-10">
                    <h1 class="font-extrabold text-4xl lg:text-6xl mb-4 text-white">
                        TechWave
                    </h1>
                    <p class="text-white/70 max-w-xl mx-auto text-sm lg:text-base">
                        Your daily dose of tech insights, productivity hacks, and personal growth
                    </p>
                    <div class="flex justify-center items-center gap-2 md:gap-3 lg:gap-4 mt-8">
                        <button 
                            class="whitespace-nowrap px-2 py-2 md:px-4 md:py-3 lg:px-5 lg:py-3 
                            text-xs md:text-sm lg:text-base font-semibold flex items-center gap-2 text-white 
                            cursor-pointer rounded-full hover:shadow-[0_0_20px_#FB09B4] 
                            bg-linear-to-r from-[#F7E93F] via-[#FB09B4] to-[#9100F8]">
                            <i class="fa-brands fa-spotify"></i> Listen on Spotify
                       </button>
                        <button 
                            class="whitespace-nowrap px-2 py-2 md:px-4 md:py-3 lg:px-5 lg:py-3 
                           text-xs md:text-sm lg:text-base font-semibold text-[#00FF88] flex items-center gap-2 
                            cursor-pointer rounded-full border border-[#00FF88]
                             transition-all duration-300 hover:-translate-y-2 hover:shadow-xl">
                            <i class="fa-regular fa-envelope"></i> Subscribe
                        </button>
                    </div>
                </div>                          
            </section>





















            
       </body>
</html>
